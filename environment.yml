name: bcpark-api
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - httpx=0.27.*
  - python-dotenv=1.0.*
  - pandas=2.2.*
  - plotly=5.24.*
  - jupyter=1.1.*
  - ipykernel=6.29.*
  # Geospatial stack (the reason to use conda over pip):
  - geopandas=1.0.*
  - shapely=2.0.*
  - pyproj=3.6.*
  - fiona=1.10.*
  - contextily=1.6.*
