  "/tokens/refresh":
    post:
      operationId: post-tokens-refresh
      description: Refresh an access token.
      tags:
        - Authentication
      responses:
        "200":
          description: Authentication successful.
          headers:
            Content-Type:
              schema:
                type: string
              description: application/json
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  access_token:
                    type: string
                    minLength: 41
                    maxLength: 41
                    pattern: ^1[0-9a-zA-Z]+$
                    example: 11685a6415d542ce0a09d2e89d7943840e2b2b111
                    description: Access token to be passed as a bearer token to authenticated requests.
                  expires_in:
                    type: integer
                    format: int32
                    description: "Time until the access token expires, in seconds."
                    example: 3600
                  refresh_token:
                    type: string
                    minLength: 36
                    maxLength: 36
                    example: 4d972a02-d0cd-4824-9166-603ae6db6660
                    description: Refresh token that can be used to acquire a new session tokens without authenticating again.
                required:
                  - access_token
                  - expires_in
                  - refresh_token
        "400":
          $ref: "#/components/responses/invalid-data"
        "401":
          description: Unauthorized. Combination of parameters does not exist.
        "404":
          description: Unknown refresh token.
        "429":
          description: Too many requests. Please wait and try again.
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  minLength: 36
                  maxLength: 36
                  example: 4d972a02-d0cd-4824-9166-603ae6db6660
              required:
                - refresh_token
