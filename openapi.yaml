  "/authenticate":
    post:
      operationId: post-authenticate
      tags:
        - Authentication
      description: Authenticate with the API and retrieve an access token for future requests.
      responses:
        "200":
          description: Authentication successful.
          headers:
            Content-Type:
              schema:
                type: string
              description: application/json
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  access_token:
                    type: string
                    minLength: 41
                    maxLength: 41
                    pattern: ^1[0-9a-zA-Z]+$
                    example: 11685a6415d542ce0a09d2e89d7943840e2b2b111
                    description: Access token to be passed as a bearer token to authenticated requests.
                  expires_in:
                    type: integer
                    format: int32
                    description: "Time until the access token expires, in seconds."
                    example: 3600
                  refresh_token:
                    type: string
                    minLength: 36
                    maxLength: 36
                    pattern: ^[0-9a-zA-Z-]{36}$
                    example: 4d972a02-d0cd-4824-9166-603ae6db6660
                    description: Refresh token that can be used to acquire a new session tokens without authenticating again.
                required:
                  - access_token
                  - expires_in
                  - refresh_token
        "400":
          $ref: "#/components/responses/invalid-data"
        "401":
          description: Unauthorized. Combination of parameters does not exist.
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              properties:
                api_key:
                  type: string
                  minLength: 1
                client_db:
                  type: string
                  minLength: 1
                username:
                  type: string
                  minLength: 1
              required:
                - api_key
                - client_db
                - username
      security: []
